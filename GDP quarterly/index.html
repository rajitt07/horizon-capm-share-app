<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Macro Indicators — GDP & CPI</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header-left h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    .header-left p { margin: 0.25rem 0 0; font-size: 0.875rem; color: #666; }
    .toggle-btns {
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #ddd;
    }
    .toggle-btn {
      padding: 0.6rem 1.25rem;
      border: none;
      background: #fff;
      color: #333;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn:not(:last-child) { border-right: 1px solid #ddd; }
    .toggle-btn:hover { background: #f5f5f5; }
    .toggle-btn.active {
      background: #2563eb;
      color: #fff;
    }
    .layout {
      display: flex;
      min-height: calc(100vh - 80px);
    }
    .sidebar {
      width: 260px;
      padding: 1rem;
      border-right: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }
    .sidebar h2 {
      margin: 0 0 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #666;
    }
    .series-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .series-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      font-size: 0.875rem;
      cursor: pointer;
      border-radius: 4px;
      padding-left: 6px;
    }
    .series-list li:hover { background: #f0f0f0; }
    .series-list li.off { opacity: 0.45; }
    .series-list .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chart-wrap {
      flex: 1;
      padding: 1rem;
      min-width: 0;
    }
    #chart {
      width: 100%;
      height: calc(100vh - 100px);
      min-height: 420px;
      background: #141414;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .buttons {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .buttons button {
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .buttons button:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1 id="chartTitle">Quarterly GDP & Components</h1>
      <p>Toggle series in the sidebar. Hover for values; drag to zoom; double-click to reset.</p>
    </div>
    <div class="toggle-btns">
      <button class="toggle-btn active" id="btnGDP" onclick="switchView('gdp')">Quarterly GDP</button>
      <button class="toggle-btn" id="btnCPI" onclick="switchView('cpi')">CPI</button>
      <button class="toggle-btn" id="btnAnnual" onclick="switchView('annual')">GDP Annual</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <h2>Series</h2>
      <ul class="series-list" id="seriesList"></ul>
      <div class="buttons">
        <button type="button" id="showAll">Show all</button>
        <button type="button" id="showMain">Main only</button>
      </div>
    </aside>
    <div class="chart-wrap">
      <div id="chart"></div>
    </div>
  </div>

        hovertemplate: "%{x}<br>" + t.name + ": %{y:.2f}%<extra></extra>"
      }));
    }
    
    function getLayout() {
      const data = getData();
      const baseLayout = {
        margin: { t: 24, r: 24, b: 80, l: 60 },
        xaxis: {
          title: currentView === 'annual' ? "Year" : "Period",
          tickangle: -45,
          tickfont: { size: 11, color: "#b0b0b0" },
          titlefont: { color: "#b0b0b0" },
          gridcolor: "#404040",
          linecolor: "#555",
          zeroline: false
        },
        yaxis: {
          title: "Growth Rate (%)",
          tickfont: { size: 11, color: "#b0b0b0" },
          titlefont: { color: "#b0b0b0" },
          gridcolor: "#404040",
          linecolor: "#555",
          zeroline: true,
          zerolinecolor: "#606060",
          zerolinewidth: 2
        },
        showlegend: false,
        hovermode: "x unified",
        plot_bgcolor: "#141414",
        paper_bgcolor: "#141414",
        font: { size: 12, color: "#b0b0b0" }
      };
      
      // For annual view, show 5-year interval ticks
      if (currentView === 'annual' && data.tickLabels) {
        baseLayout.xaxis.tickmode = 'array';
        baseLayout.xaxis.tickvals = data.tickLabels;
        baseLayout.xaxis.ticktext = data.tickLabels;
      }
      
      return baseLayout;
    }
    
    const config = { responsive: true, displayModeBar: true, displaylogo: false };
    
    function renderList() {
      const data = getData();
      const ul = document.getElementById("seriesList");
      ul.innerHTML = data.traces.map((t, i) => {
        const on = visibility[i];
        return `<li class="${on ? "" : "off"}" data-idx="${i}" style="border-left: 3px solid ${on ? colors[i % colors.length] : "transparent"}">
          <span class="dot" style="background:${colors[i % colors.length]}"></span>
          <span>${t.name}</span>
        </li>`;
      }).join("");
      ul.querySelectorAll("li").forEach(li => {
        li.addEventListener("click", () => {
          const idx = parseInt(li.dataset.idx, 10);
          visibility[idx] = !visibility[idx];
          Plotly.restyle("chart", { visible: visibility });
          renderList();
        });
      });
    }
    
    function switchView(view) {
      currentView = view;
      const data = getData();
      visibility = data.traces.map(() => true);  // Show all by default
      
      document.getElementById("btnGDP").classList.toggle("active", view === "gdp");
      document.getElementById("btnCPI").classList.toggle("active", view === "cpi");
      document.getElementById("btnAnnual").classList.toggle("active", view === "annual");
      document.getElementById("chartTitle").textContent = titles[view];
      
      Plotly.react("chart", buildPlotData(), getLayout(), config);
      renderList();
    }
    
    document.getElementById("showAll").addEventListener("click", () => {
      visibility.fill(true);
      Plotly.restyle("chart", { visible: visibility });
      renderList();
    });
    
    document.getElementById("showMain").addEventListener("click", () => {
      visibility = visibility.map((_, i) => i < 1);
      Plotly.restyle("chart", { visible: visibility });
      renderList();
    });
    
    // Initialize with GDP view
    switchView('gdp');
  </script>
</body>
</html>
