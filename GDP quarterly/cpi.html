      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #333;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;

      color: #fff;
      border-color: #2563eb;
    }
    .layout {
      display: flex;
      min-height: calc(100vh - 80px);
    }
    .sidebar {
      width: 220px;
      padding: 1rem;
      border-right: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }
    .sidebar h2 {
      margin: 0 0 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #666;
    }
    .series-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .series-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      font-size: 0.875rem;
      cursor: pointer;
      border-radius: 4px;
      padding-left: 6px;
    }
    .series-list li:hover { background: #f0f0f0; }
    .series-list li.off { opacity: 0.45; }
    .series-list .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chart-wrap {
      flex: 1;
      padding: 1rem;
      min-width: 0;
    }
    #chart {
      width: 100%;
      height: calc(100vh - 100px);
      min-height: 420px;
      background: #141414;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .buttons {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .buttons button {
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .buttons button:hover { background: #f5f5f5; }
  </style>
</head>

    <div class="chart-wrap">

      line: { shape: "spline", width: 2, color: colors[i % colors.length] },

      font: { size: 12, color: "#b0b0b0" }
    };

    Plotly.newPlot("chart", plotData, layout, { responsive: true, displayModeBar: true, displaylogo: false });

    function updateVisibility() {
      Plotly.restyle("chart", { visible: visibility });
      renderList();
    }

    function renderList() {
      const ul = document.getElementById("seriesList");
      ul.innerHTML = DATA.traces.map((t, i) => {
        const on = visibility[i];
        return `<li class="${on ? "" : "off"}" data-idx="${i}" style="border-left: 3px solid ${on ? colors[i % colors.length] : "transparent"}">
          <span class="dot" style="background:${colors[i % colors.length]}"></span>
          <span>${t.name}</span>
        </li>`;
      }).join("");
      ul.querySelectorAll("li").forEach(li => {
        li.addEventListener("click", () => {
          visibility[parseInt(li.dataset.idx, 10)] = !visibility[parseInt(li.dataset.idx, 10)];
          updateVisibility();
        });
      });
    }

    document.getElementById("showAll").addEventListener("click", () => {
      visibility.fill(true);
      updateVisibility();
    });
    document.getElementById("showMain").addEventListener("click", () => {
      visibility.forEach((_, i) => { visibility[i] = i < 2; });
      updateVisibility();
    });

    renderList();
  </script>
