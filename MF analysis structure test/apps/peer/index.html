<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peer Comparison</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        max-width: 1200px;
        margin: 24px auto;
        padding: 0 16px;
        background: #0b0d12;
        color: #e6e8ee;
      }
      h1 {
        margin: 0 0 16px 0;
        font-size: 28px;
      }
      .hint {
        color: #9aa3b2;
        font-size: 12px;
        margin-top: 4px;
      }
      .panel {
        background: #141823;
        border: 1px solid #20263a;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9aa3b2;
        margin: 0 0 10px 2px;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .top-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 6px 0 12px 0;
      }
      .toggle-group {
        display: inline-flex;
        gap: 8px;
      }
      .mode-toggle.is-active {
        border-color: #4d7cff;
        color: #b8c9ff;
      }
      .horizon-select {
        background: #0f1320;
        color: #e6e8ee;
        border: 1px solid #2a3350;
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 13px;
      }
      .summary-row {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 12px 0 12px 0;
      }
      .summary-box {
        background: #0f1320;
        border: 1px solid #2a3350;
        border-radius: 10px;
        padding: 10px;
      }
      .summary-box.fund-row {
        border-left-width: 4px;
      }
      .comparison-dashboard-wrap {
        margin-top: 12px;
      }
      .comparison-dashboard-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9aa3b2;
        margin: 0 0 8px 2px;
      }
      .summary-label {
        color: #9aa3b2;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .summary-value {
        margin-top: 6px;
        font-size: 18px;
        font-weight: 700;
        color: #e6e8ee;
      }
      .summary-value.large {
        font-size: 24px;
      }
      .summary-context {
        margin-top: 4px;
        font-size: 11px;
        color: #9aa3b2;
      }
      .summary-sub {
        margin-top: 6px;
        font-size: 12px;
        color: #9aa3b2;
      }
      .fund-card-title {
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 700;
        color: #cfd6e9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .fund-metrics-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
        gap: 10px;
      }
      .fund-card-metric {
        border-top: 1px solid #2a3350;
        padding-top: 6px;
      }
      .delta-positive {
        color: #7ddc8d;
      }
      .delta-negative {
        color: #ff8a8a;
      }
      .metric-positive {
        color: #7ddc8d;
        font-weight: 700;
      }
      .metric-negative {
        color: #ff8a8a;
        font-weight: 700;
      }
      .ranking-button.is-active {
        border-color: #4d7cff;
        color: #b8c9ff;
      }
      .ghost-button {
        white-space: nowrap;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid #2a3350;
        border-radius: 999px;
        background: #0f1320;
        color: #e6e8ee;
        cursor: pointer;
      }
      .peer-controls {
        display: grid;
        gap: 12px;
      }
      .peer-search {
        width: 100%;
        padding: 9px 12px;
        font-size: 16px;
        height: 38px;
        background: #0f1320;
        color: #e6e8ee;
        border: 1px solid #2a3350;
        border-radius: 8px;
        outline: none;
      }
      .selector-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #9aa3b2;
      }
      .selector-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .category-filter {
        background: #0f1320;
        color: #e6e8ee;
        border: 1px solid #2a3350;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
      }
      .peer-fund-list {
        max-height: 240px;
        overflow: auto;
        border: 1px solid #2a3350;
        border-radius: 10px;
        background: #0f1320;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .peer-fund-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
      }
      .peer-fund-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .peer-fund-item input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .compare-mini-btn {
        padding: 5px 10px;
        font-size: 12px;
      }
      .compare-mini-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .peer-chart-wrap {
        margin-top: 14px;
        border: 1px solid #2a3350;
        border-radius: 10px;
        padding: 12px;
        background: #0f1320;
      }
      .peer-status {
        font-size: 12px;
        color: #9aa3b2;
        margin-top: 10px;
        white-space: pre-wrap;
      }
      .peer-details {
        margin-top: 14px;
        display: block;
      }
      .comparison-table-wrap {
        overflow-x: auto;
        border: 1px solid #2a3350;
        border-radius: 10px;
        background: #0f1320;
      }
      .comparison-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }
      .comparison-table th,
      .comparison-table td {
        border-bottom: 1px solid #2a3350;
        border-right: 1px solid #2a3350;
        padding: 10px 12px;
        font-size: 13px;
        vertical-align: top;
      }
      .comparison-table thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #101627;
        color: #e6e8ee;
        text-align: left;
        font-weight: 700;
      }
      .comparison-table thead th.fund-col {
        cursor: pointer;
      }
      .comparison-table thead th.fund-col.is-active {
        color: #b8c9ff;
        border-bottom: 2px solid #4d7cff;
      }
      .comparison-table thead th:first-child,
      .comparison-table tbody th {
        position: sticky;
        left: 0;
        z-index: 1;
        background: #101627;
      }
      .comparison-table tbody th {
        color: #cfd6e9;
        text-align: left;
        font-weight: 600;
        min-width: 220px;
      }
      .comparison-table tbody td {
        color: #d8dded;
        white-space: nowrap;
      }
      .comparison-table tbody td.score-cell {
        white-space: normal;
      }
      .score-cell-wrap {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .score-value {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
      }
      .score-details {
        border: 1px solid #2a3350;
        border-radius: 8px;
        background: #0f1320;
        min-width: 190px;
      }
      .score-details summary {
        list-style: none;
        cursor: pointer;
        padding: 4px 8px;
        font-size: 11px;
        color: #cfd6e9;
        user-select: none;
      }
      .score-details summary::-webkit-details-marker {
        display: none;
      }
      .score-details[open] summary {
        border-bottom: 1px solid #2a3350;
      }
      .score-reason-list {
        margin: 0;
        padding: 6px 10px 8px 18px;
        font-size: 11px;
        color: #cfd6e9;
      }
      .score-reason-list li {
        margin: 2px 0;
      }
      .comparison-table th:last-child,
      .comparison-table td:last-child {
        border-right: 0;
      }
      .comparison-table tbody tr:last-child th,
      .comparison-table tbody tr:last-child td {
        border-bottom: 0;
      }
    </style>
  </head>
  <body>
    <h1>Peer Comparison</h1>
      <div class="panel">
        <div class="section-head">
          <div class="section-title">Peer Comparison (Direct Plan)</div>
          <button id="peer-ranking-toggle" type="button" class="ghost-button ranking-button">Ranking</button>
        </div>
      <div class="top-controls">
        <div class="toggle-group">
          <button id="mode-prev" type="button" class="ghost-button mode-toggle is-active">Previous Month</button>
          <button id="mode-latest" type="button" class="ghost-button mode-toggle">Latest Data</button>
        </div>
        <label for="horizon-select" class="hint">Horizon</label>
        <select id="horizon-select" class="horizon-select">
          <option value="1">1Y</option>
          <option value="3">3Y</option>
          <option value="5">5Y</option>
          <option value="10">10Y</option>
        </select>
      </div>
      <div class="peer-controls">
        <input
          id="peer-search"
          class="peer-search"
          type="text"
          placeholder="Search funds by scheme name or category"
        />
        <div class="selector-meta">
          <span id="peer-selected-count">Selected: 0</span>
          <div class="selector-actions">
            <select id="peer-category-filter" class="category-filter" aria-label="Filter by Category">
              <option value="">All Categories</option>
            </select>
            <button id="peer-select-all" type="button" class="ghost-button">Select All</button>
            <button id="peer-clear" type="button" class="ghost-button">Clear</button>
          </div>
        </div>
        <div id="peer-fund-list" class="peer-fund-list"></div>
      </div>
      <div class="peer-chart-wrap">
        <canvas id="peer-nav-chart" height="110"></canvas>
        <div class="hint">Daily NAV, rebased to 100 at 30-Sep-2025.</div>
      </div>
      <div class="comparison-dashboard-wrap">
        <div class="comparison-dashboard-title">Comparison Dashboard</div>
        <div id="summary-row" class="summary-row"></div>
      </div>
      <div id="peer-status" class="peer-status"></div>
      <div id="peer-details" class="peer-details"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script>
      const comparisonXlsxUrl = "../../data/matched_only_sorted.xlsx";
      const latestCsvUrl = "../../data/latest.csv";
      const amfiNavCsvUrl =
        "../../data/matched_only_sorted_amfi_nav_curve_funds_only_2025-09-30_to_2025-12-25.csv";
      const peerSearchInput = document.getElementById("peer-search");
      const peerFundList = document.getElementById("peer-fund-list");
      const peerStatus = document.getElementById("peer-status");
      const peerDetails = document.getElementById("peer-details");
      const peerSelectedCount = document.getElementById("peer-selected-count");
      const peerSelectAllButton = document.getElementById("peer-select-all");
      const peerClearButton = document.getElementById("peer-clear");
      const peerCategoryFilter = document.getElementById("peer-category-filter");
      const peerRankingToggleButton = document.getElementById("peer-ranking-toggle");
      const modePrevButton = document.getElementById("mode-prev");
      const modeLatestButton = document.getElementById("mode-latest");
      const horizonSelect = document.getElementById("horizon-select");
      const summaryRow = document.getElementById("summary-row");
      const peerChartCanvas = document.getElementById("peer-nav-chart");

      const peerState = {
        funds: [],
        datasets: {
          previous: { funds: [], categoryAverageRows: new Map() },
          latest: { funds: [], categoryAverageRows: new Map() },
        },
        selectedSchemes: new Set(),
        navCache: new Map(),
        amfiNavByScheme: new Map(),
        categoryAverageRows: new Map(),
        rankMode: false,
        mode: { previous: true, latest: false },
        selectedHorizon: "1",
        selectedCategoryFilter: "",
        activeSummaryScheme: null,
        chart: null,
      };
      const maxSelectedFunds = 3;
      const comparisonBaseDateRaw = "30-Sep-2025";
      const fundLinePalette = [
        "#7cb9ff",
        "#f7a35c",
        "#90ed7d",
        "#f15c80",
        "#8085e9",
        "#2b908f",
        "#f45b5b",
        "#91e8e1",
      ];
      const categoryToAverageSchemeKey = {
        "dividend yield": "category_avg_dividend",
        elss: "category_avg_elss",
        "flexi cap": "category_avg_flexicap",
        "large and mid cap": "category_avg_l&m",
        "large cap": "category_avg_largecap",
        "mid cap": "category_avg_midcap",
        "multi cap": "category_avg_multicap",
        "sectorial:thematic": "category_avg_st",
        "small cap": "category_avg_smallcap",
        value: "category_avg_value",
      };

      function normalizeKey(value) {
        return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
      }

      function getHorizonFields(year) {
        return {
          ret: `Return ${year} Year (%) Direct`,
          bench: `Return ${year} Year (%) Benchmark`,
          alpha: `Alpha ${year}yr`,
          ir: year === "10" ? "Information Ratio* 10 Year (Direct)" : `Information Ratio* ${year} Year (Direct)`,
        };
      }

      function getActiveFunds() {
        if (peerState.mode.previous && peerState.mode.latest) {
          const prevFunds = peerState.datasets.previous.funds || [];
          const latestMap = new Map((peerState.datasets.latest.funds || []).map((f) => [normalizeKey(f.scheme_name), f]));
          return prevFunds.map((f) => latestMap.get(normalizeKey(f.scheme_name)) || f);
        }
        if (peerState.mode.latest) return peerState.datasets.latest.funds || [];
        return peerState.datasets.previous.funds || [];
      }

      function getActiveCategoryAverageRows() {
        if (peerState.mode.latest && !peerState.mode.previous) return peerState.datasets.latest.categoryAverageRows;
        return peerState.datasets.previous.categoryAverageRows;
      }

      function setModeButtonState() {
        modePrevButton?.classList.toggle("is-active", peerState.mode.previous);
        modeLatestButton?.classList.toggle("is-active", peerState.mode.latest);
      }

      function applyModeFallback() {
        if (!peerState.mode.previous && !peerState.mode.latest) peerState.mode.previous = true;
      }

      function getValue(row, key) {
        return row[key] ?? null;
      }

      function parseCsvRow(line) {
        const values = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];
          if (char === '"' && line[i + 1] === '"') {
            current += '"';
            i += 1;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === "," && !inQuotes) {
            values.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        values.push(current);
        return values;
      }

      function parseNumber(value) {
        if (value === null || value === undefined || value === "") {
          return null;
        }
        if (typeof value === "number") {
          return Number.isFinite(value) ? value : null;
        }
        const parsed = Number.parseFloat(String(value).replace(/,/g, "").trim());
        return Number.isFinite(parsed) ? parsed : null;
      }

      function format2(value) {
        const num = parseNumber(value);
        return num === null ? "NA" : num.toFixed(2);
      }

      function toScoreNumber(value) {
        const num = parseNumber(value);
        if (num === null) return null;
        return Math.round(num * 100) / 100;
      }

      function safeText(value) {
        if (value === null || value === undefined || value === "") {
          return "NA";
        }
        return String(value);
      }

      function parseDdMmYyyy(dateText) {
        const parts = String(dateText || "").split("-");
        if (parts.length !== 3) {
          return null;
        }
        const monthMap = {
          jan: 1,
          feb: 2,
          mar: 3,
          apr: 4,
          may: 5,
          jun: 6,
          jul: 7,
          aug: 8,
          sep: 9,
          oct: 10,
          nov: 11,
          dec: 12,
        };
        const day = Number.parseInt(parts[0], 10);
        const monthPart = String(parts[1] || "").trim();
        const monthNumeric = Number.parseInt(monthPart, 10);
        const month = Number.isFinite(monthNumeric)
          ? monthNumeric
          : monthMap[monthPart.slice(0, 3).toLowerCase()];
        const year = Number.parseInt(parts[2], 10);
        if (!Number.isFinite(day) || !Number.isFinite(month) || !Number.isFinite(year)) {
          return null;
        }
        return new Date(year, month - 1, day);
      }

      function isSameCalendarDate(a, b) {
        return (
          a instanceof Date &&
          b instanceof Date &&
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }

      function pickConsistencyColumns(headers) {
        const byYear = {};
        headers.forEach((header) => {
          const label = String(header || "");
          const normalized = label.toLowerCase();
          if (!normalized.includes("direct") || !normalized.includes("consist")) return;
          const match = normalized.match(/(1|3|5|10)\s*year/);
          if (match) byYear[match[1]] = label;
        });
        return byYear;
      }

      function getLatestCategoryAverageFieldName(fieldName) {
        const directMatch = {
          "Return 1 Year (%) Direct": "Category Avg Return 1 Year (%) Direct",
          "Return 3 Year (%) Direct": "Category Avg Return 3 Year (%) Direct",
          "Return 5 Year (%) Direct": "Category Avg Return 5 Year (%) Direct",
          "Return 10 Year (%) Direct": "Category Avg Return 10 Year (%) Direct",
          "ter_Direct Plan - Total TER (%)": "Category Avg Direct TER (%)",
          "NAV Std Dev (Rebased)": "Category Avg NAV Std Dev (Rebased)",
          "Category Avg NAV Std Dev (Rebased)": "Category Avg NAV Std Dev (Rebased)",
        };
        return directMatch[fieldName] || null;
      }

      function getCategoryAverageFromFundRow(fund, fieldName) {
        if (!fund || !fieldName) return null;
        const candidates = [];
        candidates.push(`Category Avg ${fieldName}`);
        if (fieldName.includes(" Year ")) {
          candidates.push(`Category Avg ${fieldName.replace(" Year ", "Y ")}`);
        }
        if (fieldName === "ter_Direct Plan - Total TER (%)") {
          candidates.push("Category Avg Direct TER (%)");
          candidates.push("Category Avg TER (%)");
          candidates.push("ter_Direct Plan - Total TER (%)_Avg");
        }
        if (fieldName === "NAV Std Dev (Rebased)") {
          candidates.push("Category Avg NAV Std Dev (Rebased)");
        }
        for (const key of candidates) {
          if (fund[key] !== undefined && fund[key] !== null && fund[key] !== "") {
            return fund[key];
          }
        }
        const latestMapped = getLatestCategoryAverageFieldName(fieldName);
        if (latestMapped && fund[latestMapped] !== undefined && fund[latestMapped] !== null && fund[latestMapped] !== "") {
          return fund[latestMapped];
        }
        return null;
      }

      function getCategoryAverageRowsForFund(fund) {
        const prevFunds = peerState.datasets.previous.funds || [];
        if (prevFunds.some((f) => f === fund)) {
          return peerState.datasets.previous.categoryAverageRows;
        }
        const latestFunds = peerState.datasets.latest.funds || [];
        if (latestFunds.some((f) => f === fund)) {
          return peerState.datasets.latest.categoryAverageRows;
        }
        return getActiveCategoryAverageRows();
      }

      function getCategoryAverageValue(fund, fieldName) {
        const rowValue = getCategoryAverageFromFundRow(fund, fieldName);
        if (rowValue !== null) {
          return rowValue;
        }
        const categoryKey = normalizeKey(fund?.category || "");
        if (!categoryKey) return null;
        const avgSchemeKey =
          categoryToAverageSchemeKey[categoryKey] || `category_avg_${categoryKey}`;
        const map = getCategoryAverageRowsForFund(fund);
        let avgRow = map?.get(normalizeKey(avgSchemeKey));
        if (!avgRow && peerState.categoryAverageRows?.size) {
          avgRow = peerState.categoryAverageRows.get(normalizeKey(avgSchemeKey));
        }
        if (!avgRow) {
          return null;
        }
        return avgRow[fieldName];
      }

      function getCategoryAverageValueFromDataset(fund, fieldName, datasetName) {
        const rowValue = getCategoryAverageFromFundRow(fund, fieldName);
        if (rowValue !== null) {
          return rowValue;
        }
        const categoryKey = normalizeKey(fund?.category || "");
        if (!categoryKey) return null;
        const avgSchemeKey =
          categoryToAverageSchemeKey[categoryKey] || `category_avg_${categoryKey}`;
        const map = peerState.datasets?.[datasetName]?.categoryAverageRows;
        let avgRow = map?.get(normalizeKey(avgSchemeKey));
        if (!avgRow && peerState.categoryAverageRows?.size) {
          avgRow = peerState.categoryAverageRows.get(normalizeKey(avgSchemeKey));
        }
        return avgRow ? avgRow[fieldName] : null;
      }

      function computeFundScore(fund) {
        const h = getHorizonFields(peerState.selectedHorizon);
        const ret1 = toScoreNumber(fund[h.ret]);
        const catRet1 = toScoreNumber(getCategoryAverageValue(fund, h.ret));
        const aumChange = toScoreNumber(fund["aum diff"] ?? fund["AUM Change Dec"]);
        const ter = toScoreNumber(fund["ter_Direct Plan - Total TER (%)"]);
        const catTer = toScoreNumber(getCategoryAverageValue(fund, "ter_Direct Plan - Total TER (%)"));
        const alpha1 = toScoreNumber(fund[h.alpha]);
        const consistency1 = toScoreNumber(fund[h.ir]);
        const navStd = toScoreNumber(fund["NAV Std Dev (Rebased)"]);
        const catNavStd =
          toScoreNumber(fund["Category Avg NAV Std Dev (Rebased)"]) ??
          toScoreNumber(getCategoryAverageValue(fund, "Category Avg NAV Std Dev (Rebased)"));

        const c1 = ret1 !== null && catRet1 !== null && ret1 > catRet1 ? 1 : 0;
        const c2 = aumChange !== null && aumChange > 0 ? 1 : 0;
        const c3 = ter !== null && catTer !== null && ter <= catTer ? 1 : 0;
        const c4 = alpha1 !== null && alpha1 > 0 ? 1 : 0;
        const c5 = consistency1 !== null && consistency1 > 1 ? 1 : 0;
        const c6 = navStd !== null && catNavStd !== null && navStd < catNavStd ? 1 : 0;
        return c1 + c2 + c3 + c4 + c5 + c6;
      }

      function computeFundScoreDetails(fund) {
        const h = getHorizonFields(peerState.selectedHorizon);
        const ret1 = toScoreNumber(fund[h.ret]);
        const catRet1 = toScoreNumber(getCategoryAverageValue(fund, h.ret));
        const aumChange = toScoreNumber(fund["aum diff"] ?? fund["AUM Change Dec"]);
        const ter = toScoreNumber(fund["ter_Direct Plan - Total TER (%)"]);
        const catTer = toScoreNumber(getCategoryAverageValue(fund, "ter_Direct Plan - Total TER (%)"));
        const alpha1 = toScoreNumber(fund[h.alpha]);
        const consistency1 = toScoreNumber(fund[h.ir]);
        const navStd = toScoreNumber(fund["NAV Std Dev (Rebased)"]);
        const catNavStd =
          toScoreNumber(fund["Category Avg NAV Std Dev (Rebased)"]) ??
          toScoreNumber(getCategoryAverageValue(fund, "Category Avg NAV Std Dev (Rebased)"));

        const checks = [
          {
            label: "return>category_avg",
            pass: ret1 !== null && catRet1 !== null && ret1 > catRet1,
          },
          {
            label: "aum>0",
            pass: aumChange !== null && aumChange > 0,
          },
          {
            label: "ter<=category_avg",
            pass: ter !== null && catTer !== null && ter <= catTer,
          },
          {
            label: "alpha1yr>0",
            pass: alpha1 !== null && alpha1 > 0,
          },
          {
            label: "consistency1y>1",
            pass: consistency1 !== null && consistency1 > 1,
          },
          {
            label: "stddev<category_avg",
            pass: navStd !== null && catNavStd !== null && navStd < catNavStd,
          },
        ];
        const total = checks.reduce((sum, check) => sum + (check.pass ? 1 : 0), 0);
        const reasons = checks.map((check) => `${check.label}: ${check.pass ? "+1" : "0"}`);
        return { total, reasons };
      }

      function parseReturnDiffs(anchor, candidate) {
        const fields = [
          "Return 1 Year (%) Direct",
          "Return 3 Year (%) Direct",
          "Return 5 Year (%) Direct",
          "Return 10 Year (%) Direct",
        ];
        const diffs = {};
        let sum = 0;
        let used = 0;
        fields.forEach((field) => {
          const a = parseNumber(anchor[field]);
          const b = parseNumber(candidate[field]);
          if (a === null || b === null) {
            diffs[field] = null;
            return;
          }
          const d = Math.abs(a - b);
          diffs[field] = d;
          sum += d;
          used += 1;
        });
        const avg = used > 0 ? sum / used : Number.POSITIVE_INFINITY;
        return { diffs, avg, used };
      }

      function findNearestFundForComparison(anchorFund) {
        const categoryKey = normalizeKey(anchorFund?.category || "");
        if (!categoryKey) {
          return null;
        }

        const categoryPool = peerState.funds.filter(
          (fund) =>
            fund.scheme_name !== anchorFund.scheme_name &&
            !peerState.selectedSchemes.has(fund.scheme_name) &&
            normalizeKey(fund.category) === categoryKey
        );
        if (!categoryPool.length) {
          return null;
        }

        const anchorBenchmark = normalizeKey(anchorFund["Benchmark"]);
        const benchmarkMatchedPool = categoryPool.filter(
          (fund) => normalizeKey(fund["Benchmark"]) === anchorBenchmark
        );
        const pool = benchmarkMatchedPool.length ? benchmarkMatchedPool : categoryPool;

        let best = null;
        pool.forEach((candidate) => {
          const diffResult = parseReturnDiffs(anchorFund, candidate);
          const candidateScore = diffResult.avg;
          const candidateInfo = {
            candidate,
            score: candidateScore,
            usedReturns: diffResult.used,
            diffs: diffResult.diffs,
            benchmarkMatched: benchmarkMatchedPool.length > 0,
          };
          if (!best) {
            best = candidateInfo;
            return;
          }
          if (candidateInfo.score < best.score) {
            best = candidateInfo;
            return;
          }
          if (candidateInfo.score === best.score && candidateInfo.usedReturns > best.usedReturns) {
            best = candidateInfo;
          }
        });

        return best;
      }

      async function handleCompareForFund(anchorSchemeName) {
        const anchorFund = peerState.funds.find((f) => f.scheme_name === anchorSchemeName);
        if (!anchorFund) {
          peerStatus.textContent = `Compare failed: anchor fund not found (${anchorSchemeName}).`;
          return;
        }
        if (peerState.selectedSchemes.size >= maxSelectedFunds) {
          peerStatus.textContent = `Comparison limit reached (max ${maxSelectedFunds} funds). Clear one to compare another.`;
          return;
        }

        const nearest = findNearestFundForComparison(anchorFund);
        if (!nearest) {
          peerStatus.textContent = `No comparison fund found for ${anchorSchemeName} (category match required).`;
          return;
        }

        peerState.selectedSchemes.add(nearest.candidate.scheme_name);
        updatePeerSelectedCount();
        renderPeerFundList();
        await refreshPeerComparison();
      }

      async function fetchNavBundleStrictDirect(schemeName) {
        if (peerState.navCache.has(schemeName)) return peerState.navCache.get(schemeName);
        const series = peerState.amfiNavByScheme.get(schemeName);
        if (!series || !series.length) {
          const unmatched = { matched: false, reason: "No strict exact AMFI CSV scheme match." };
          peerState.navCache.set(schemeName, unmatched);
          return unmatched;
        }
        const baseDate = parseDdMmYyyy(comparisonBaseDateRaw);
        const dailyPoints = [...series].sort((a, b) => a.date - b.date);
        const basePoint = dailyPoints.find((point) => isSameCalendarDate(point.date, baseDate));
        if (!basePoint) {
          const noBase = { matched: false, reason: `No NAV found on base date ${comparisonBaseDateRaw}.` };
          peerState.navCache.set(schemeName, noBase);
          return noBase;
        }
        const filteredPoints = dailyPoints.filter((point) => point.date >= baseDate);
        const latest = filteredPoints[filteredPoints.length - 1] || dailyPoints[dailyPoints.length - 1];
        const bundle = {
          matched: true,
          points: filteredPoints,
          latestNav: parseNumber(latest?.nav),
          latestDate: latest?.rawDate || "NA",
          baseNav: parseNumber(basePoint.nav),
        };
        peerState.navCache.set(schemeName, bundle);
        return bundle;
      }

      async function loadAmfiNavCsvData() {
        const response = await fetch(amfiNavCsvUrl);
        if (!response.ok) throw new Error(`Unable to load AMFI NAV CSV (${response.status}).`);
        const csvText = await response.text();
        const lines = csvText.split(/\r?\n/).filter((line) => line.trim().length > 0);
        const header = parseCsvRow(lines[0]);
        const schemeIndex = header.indexOf("scheme_name");
        const navDateIndex = header.indexOf("nav_date");
        const navIndex = header.indexOf("nav");
        if (schemeIndex === -1 || navDateIndex === -1 || navIndex === -1) {
          throw new Error("AMFI NAV CSV missing required columns.");
        }
        const grouped = new Map();
        for (let i = 1; i < lines.length; i += 1) {
          const row = parseCsvRow(lines[i]);
          const schemeName = String(row[schemeIndex] || "").trim();
          const rawDate = String(row[navDateIndex] || "").trim();
          const date = parseDdMmYyyy(rawDate);
          const nav = parseNumber(row[navIndex]);
          if (!schemeName || !date || nav === null) continue;
          if (!grouped.has(schemeName)) grouped.set(schemeName, []);
          grouped.get(schemeName).push({ date, nav, rawDate });
        }
        grouped.forEach((series, key) => {
          series.sort((a, b) => a.date - b.date);
          grouped.set(key, series);
        });
        peerState.amfiNavByScheme = grouped;
        peerState.navCache.clear();
      }

      async function refreshPeerComparison() {
        peerState.funds = getActiveFunds();
        const selectedFunds = peerState.funds.filter((row) => peerState.selectedSchemes.has(row.scheme_name));
        if (!selectedFunds.length) {
          peerStatus.textContent = "Select one or more funds to view peer comparison.";
          peerDetails.innerHTML = "";
          if (peerState.chart) peerState.chart.destroy();
          peerState.chart = null;
          return;
        }
        peerStatus.textContent = `Loading NAV data from AMFI CSV (daily, base date ${comparisonBaseDateRaw})...`;
        const navResults = new Map();
        const statusLines = [];
        for (const fund of selectedFunds) {
          try {
            const navBundle = await fetchNavBundleStrictDirect(fund.scheme_name);
            navResults.set(fund.scheme_name, navBundle);
            statusLines.push(
              navBundle.matched
                ? `Matched: ${fund.scheme_name} -> points ${navBundle.points.length}`
                : `Unmatched: ${fund.scheme_name} -> ${navBundle.reason}`
            );
          } catch (error) {
            navResults.set(fund.scheme_name, { matched: false, reason: error.message });
            statusLines.push(`Error: ${fund.scheme_name} -> ${error.message}`);
          }
        }
        const consistencyColumns = pickConsistencyColumns(Object.keys(peerState.funds[0] || {}));
        renderPeerChart(selectedFunds, navResults);
        renderPeerDetails(selectedFunds, navResults, consistencyColumns);
        renderSummaryCards(selectedFunds);
        peerStatus.textContent = statusLines.join("\n");
      }

      function normalizeLatestRow(row) {
        const normalized = {
          ...row,
          scheme_name: String(row["Scheme Name"] || row["scheme_name"] || "").trim(),
          category: String(row["category"] || row["Category"] || "").trim(),
        };
        // Header alias mapping for latest.csv shorthand columns.
        const aliasMap = {
          "Return 3Y (%) Direct": "Return 3 Year (%) Direct",
          "Return 5Y (%) Direct": "Return 5 Year (%) Direct",
          "Return 10Y (%) Direct": "Return 10 Year (%) Direct",
          "Category Avg Return 3Y (%) Direct": "Category Avg Return 3 Year (%) Direct",
          "Category Avg Return 5Y (%) Direct": "Category Avg Return 5 Year (%) Direct",
          "Category Avg Return 10Y (%) Direct": "Category Avg Return 10 Year (%) Direct",
          "Consistency 3Y (Direct)": "Information Ratio* 3 Year (Direct)",
          "Consistency 5Y (Direct)": "Information Ratio* 5 Year (Direct)",
          "Consistency 10Y (Direct)": "Information Ratio* 10 Year (Direct)",
        };
        Object.entries(aliasMap).forEach(([sourceKey, targetKey]) => {
          if (normalized[targetKey] !== undefined && normalized[targetKey] !== null && normalized[targetKey] !== "") return;
          const sourceVal = row[sourceKey];
          if (sourceVal === undefined || sourceVal === null || sourceVal === "") return;
          const num = parseNumber(sourceVal);
          normalized[targetKey] = num === null ? sourceVal : num;
        });
        // Normalize latest CSV columns to the same keys the XLSX path uses.
        if (row["Direct Total TER (%)"] !== undefined && normalized["ter_Direct Plan - Total TER (%)"] === undefined) {
          normalized["ter_Direct Plan - Total TER (%)"] = row["Direct Total TER (%)"];
        }
        if (row["Category Avg TER (%)"] !== undefined && normalized["Category Avg Direct TER (%)"] === undefined) {
          normalized["Category Avg Direct TER (%)"] = row["Category Avg TER (%)"];
        }
        if (row["Category Avg Return 1Y (%) Direct"] !== undefined && normalized["Category Avg Return 1 Year (%) Direct"] === undefined) {
          normalized["Category Avg Return 1 Year (%) Direct"] = row["Category Avg Return 1Y (%) Direct"];
        }
        if (row["Category Avg Return 3Y (%) Direct"] !== undefined && normalized["Category Avg Return 3 Year (%) Direct"] === undefined) {
          normalized["Category Avg Return 3 Year (%) Direct"] = row["Category Avg Return 3Y (%) Direct"];
        }
        if (row["Category Avg Return 5Y (%) Direct"] !== undefined && normalized["Category Avg Return 5 Year (%) Direct"] === undefined) {
          normalized["Category Avg Return 5 Year (%) Direct"] = row["Category Avg Return 5Y (%) Direct"];
        }
        if (row["Category Avg Return 10Y (%) Direct"] !== undefined && normalized["Category Avg Return 10 Year (%) Direct"] === undefined) {
          normalized["Category Avg Return 10 Year (%) Direct"] = row["Category Avg Return 10Y (%) Direct"];
        }
        ["1", "3", "5", "10"].forEach((year) => {
          const f = getHorizonFields(year);
          const existingAlpha = parseNumber(normalized[f.alpha]);
          if (existingAlpha !== null) {
            return;
          }
          const ret = parseNumber(normalized[f.ret]);
          const bm = parseNumber(normalized[f.bench]);
          if (ret !== null && bm !== null) normalized[f.alpha] = ret - bm;
        });
        return normalized;
      }

      async function loadLatestCsv() {
        const response = await fetch(latestCsvUrl);
        if (!response.ok) throw new Error(`Unable to load latest CSV (${response.status}).`);
        const csvText = await response.text();
        const lines = csvText.split(/\r?\n/).filter((line) => line.trim().length > 0);
        if (!lines.length) {
          peerState.datasets.latest = { funds: [], categoryAverageRows: new Map() };
          return;
        }
        const headers = parseCsvRow(lines[0]);
        const headerMap = {
          "Return 3Y (%) Direct": "Return 3 Year (%) Direct",
          "Return 5Y (%) Direct": "Return 5 Year (%) Direct",
          "Return 10Y (%) Direct": "Return 10 Year (%) Direct",
          "Category Avg Return 1Y (%) Direct": "Category Avg Return 1 Year (%) Direct",
          "Category Avg Return 3Y (%) Direct": "Category Avg Return 3 Year (%) Direct",
          "Category Avg Return 5Y (%) Direct": "Category Avg Return 5 Year (%) Direct",
          "Category Avg Return 10Y (%) Direct": "Category Avg Return 10 Year (%) Direct",
          "Consistency 3Y (Direct)": "Information Ratio* 3 Year (Direct)",
          "Consistency 5Y (Direct)": "Information Ratio* 5 Year (Direct)",
          "Consistency 10Y (Direct)": "Information Ratio* 10 Year (Direct)",
          "Category Avg Direct TER (%)": "ter_Direct Plan - Total TER (%)_Avg",
        };
        const rows = [];
        for (let i = 1; i < lines.length; i += 1) {
          const cells = parseCsvRow(lines[i]);
          const row = {};
          headers.forEach((h, idx) => {
            const canonicalKey = headerMap[h] || h;
            const raw = cells[idx] ?? null;
            const parsed = parseNumber(raw);
            const value = parsed === null ? raw : parsed;
            if (row[canonicalKey] === undefined || row[canonicalKey] === null || row[canonicalKey] === "") {
              row[canonicalKey] = value;
            }
          });
          rows.push(normalizeLatestRow(row));
        }
        const fileOrder = new Map();
        rows.forEach((row, idx) => {
          const key = normalizeKey(row.scheme_name);
          if (key && !key.startsWith("category_avg_")) {
            fileOrder.set(key, idx);
          }
        });
        const categoryAvgRowsFromCsv = new Map();
        rows.forEach((row) => {
          const key = normalizeKey(row.scheme_name);
          if (key.startsWith("category_avg_")) {
            categoryAvgRowsFromCsv.set(key, row);
          }
        });
        const fundsOnly = rows.filter(
          (row) => row.scheme_name && !normalizeKey(row.scheme_name).startsWith("category_avg_")
        );
        const prevByScheme = new Map(
          (peerState.datasets.previous.funds || []).map((f) => [normalizeKey(f.scheme_name), f])
        );
        fundsOnly.forEach((fund) => {
          if (!fund.category) {
            fund.category = String(prevByScheme.get(normalizeKey(fund.scheme_name))?.category || "").trim();
          }
        });
        const orderIndex = new Map((peerState.datasets.previous.funds || []).map((f, i) => [normalizeKey(f.scheme_name), i]));
        fundsOnly.sort((a, b) => {
          const ka = normalizeKey(a.scheme_name);
          const kb = normalizeKey(b.scheme_name);
          const ia = orderIndex.get(ka);
          const ib = orderIndex.get(kb);
          if (ia !== undefined && ib !== undefined) return ia - ib;
          if (ia !== undefined) return -1;
          if (ib !== undefined) return 1;
          const fa = fileOrder.get(ka);
          const fb = fileOrder.get(kb);
          if (fa !== undefined && fb !== undefined && fa !== fb) return fa - fb;
          return String(a.scheme_name).localeCompare(String(b.scheme_name));
        });
        peerState.datasets.latest = {
          funds: fundsOnly,
          categoryAverageRows: categoryAvgRowsFromCsv,
        };
        peerState.categoryAverageRows = categoryAvgRowsFromCsv;
      }

      function initSelectionFromActiveFunds() {
        if (!peerState.datasets.previous.funds.length && peerState.datasets.latest.funds.length) {
          peerState.mode.previous = false;
          peerState.mode.latest = true;
        }
        peerState.funds = getActiveFunds();
        const available = new Set(peerState.funds.map((f) => normalizeKey(f.scheme_name)));
        const next = new Set([...peerState.selectedSchemes].filter((n) => available.has(normalizeKey(n))));
        if (!next.size) getDisplayedFunds().slice(0, maxSelectedFunds).forEach((r) => next.add(r.scheme_name));
        peerState.selectedSchemes = next;
        updateCategoryFilterOptions();
        const visible = new Set(getFilteredDisplayedFunds().map((f) => normalizeKey(f.scheme_name)));
        peerState.selectedSchemes = new Set(
          [...peerState.selectedSchemes].filter((name) => visible.has(normalizeKey(name)))
        );
        if (!peerState.selectedSchemes.size) {
          getFilteredDisplayedFunds().slice(0, maxSelectedFunds).forEach((r) => peerState.selectedSchemes.add(r.scheme_name));
        }
        if (!peerState.selectedSchemes.has(peerState.activeSummaryScheme)) {
          peerState.activeSummaryScheme = [...peerState.selectedSchemes][0] || null;
        }
        updatePeerSelectedCount();
        updateRankingButtonState();
        renderPeerFundList();
      }

      function renderSummaryCards(selectedFunds) {
        if (!summaryRow) return;
        summaryRow.innerHTML = "";
        if (!selectedFunds?.length) return;
        const h = getHorizonFields(peerState.selectedHorizon);
        const sideBySide = peerState.mode.previous && peerState.mode.latest;
        selectedFunds.forEach((fund, index) => {
          const fundColor = fundLinePalette[index % fundLinePalette.length];
          const prevFund = (peerState.datasets.previous.funds || []).find(
            (f) => normalizeKey(f.scheme_name) === normalizeKey(fund?.scheme_name)
          );
          const latestFund = (peerState.datasets.latest.funds || []).find(
            (f) => normalizeKey(f.scheme_name) === normalizeKey(fund?.scheme_name)
          );
          const card = document.createElement("div");
          card.className = "summary-box fund-row";
          card.style.borderLeftColor = fundColor;
          const title = document.createElement("div");
          title.className = "fund-card-title";
          title.textContent = safeText(fund.scheme_name);
          title.style.color = fundColor;
          card.appendChild(title);
          const metricsWrap = document.createElement("div");
          metricsWrap.className = "fund-metrics-grid";

          const metrics = [
            {
              label: `Return ${peerState.selectedHorizon}Y (%) Direct`,
              prevVal: parseNumber(prevFund?.[h.ret]),
              latestVal: parseNumber(latestFund?.[h.ret]),
            },
            {
              label: `Category Avg Return ${peerState.selectedHorizon}Y (%) Direct`,
              prevVal: parseNumber(
                prevFund ? getCategoryAverageValueFromDataset(prevFund, h.ret, "previous") : null
              ),
              latestVal: parseNumber(
                latestFund ? getCategoryAverageValueFromDataset(latestFund, h.ret, "latest") : null
              ),
            },
            {
              label: `Alpha ${peerState.selectedHorizon}Y`,
              prevVal: parseNumber(prevFund?.[h.alpha]),
              latestVal: parseNumber(latestFund?.[h.alpha]),
            },
            {
              label: `Consistency ${peerState.selectedHorizon}Y (Direct)`,
              prevVal: parseNumber(prevFund?.[h.ir]),
              latestVal: parseNumber(latestFund?.[h.ir]),
            },
          ];

          metrics.forEach((m) => {
            const row = document.createElement("div");
            row.className = "fund-card-metric";
            const label = document.createElement("div");
            label.className = "summary-label";
            label.textContent = m.label;
            const value = document.createElement("div");
            value.className = "summary-value";
            value.style.color = fundColor;
            if (sideBySide) {
              value.textContent = `Prev: ${m.prevVal === null ? "NA" : m.prevVal.toFixed(2)} | Latest: ${
                m.latestVal === null ? "NA" : m.latestVal.toFixed(2)
              }`;
              const delta = document.createElement("div");
              delta.className = "summary-sub";
              if (m.prevVal !== null && m.latestVal !== null) {
                const d = m.latestVal - m.prevVal;
                delta.textContent = `Δ ${d >= 0 ? "+" : ""}${d.toFixed(2)}`;
                delta.classList.add(d >= 0 ? "delta-positive" : "delta-negative");
              } else {
                delta.textContent = "Δ NA";
              }
              row.appendChild(label);
              row.appendChild(value);
              row.appendChild(delta);
            } else {
              const single = peerState.mode.latest ? m.latestVal : m.prevVal;
              value.classList.add("large");
              value.textContent = single === null ? "NA" : single.toFixed(2);
              row.appendChild(label);
              row.appendChild(value);
            }
            metricsWrap.appendChild(row);
          });
          card.appendChild(metricsWrap);
          summaryRow.appendChild(card);
        });
      }

      peerSearchInput?.addEventListener("input", renderPeerFundList);
      peerRankingToggleButton?.addEventListener("click", () => {
        peerState.rankMode = !peerState.rankMode;
        updateRankingButtonState();
        renderPeerFundList();
      });
      peerSelectAllButton?.addEventListener("click", async () => {
        peerState.selectedSchemes = new Set(
          getFilteredDisplayedFunds().slice(0, maxSelectedFunds).map((row) => row.scheme_name)
        );
        peerState.activeSummaryScheme = [...peerState.selectedSchemes][0] || null;
        peerStatus.textContent = `Selected first ${maxSelectedFunds} funds (comparison limit).`;
        updatePeerSelectedCount();
        renderPeerFundList();
        await refreshPeerComparison();
      });
      peerClearButton?.addEventListener("click", async () => {
        peerState.selectedSchemes = new Set();
        peerState.activeSummaryScheme = null;
        updatePeerSelectedCount();
        renderPeerFundList();
        await refreshPeerComparison();
      });
      peerCategoryFilter?.addEventListener("change", async () => {
        peerState.selectedCategoryFilter = String(peerCategoryFilter.value || "");
        const visible = new Set(getFilteredDisplayedFunds().map((f) => normalizeKey(f.scheme_name)));
        peerState.selectedSchemes = new Set(
          [...peerState.selectedSchemes].filter((name) => visible.has(normalizeKey(name)))
        );
        if (!peerState.selectedSchemes.size) {
          getFilteredDisplayedFunds().slice(0, maxSelectedFunds).forEach((r) => peerState.selectedSchemes.add(r.scheme_name));
        }
        peerState.activeSummaryScheme = [...peerState.selectedSchemes][0] || null;
        updatePeerSelectedCount();
        renderPeerFundList();
        await refreshPeerComparison();
      });

      modePrevButton?.addEventListener("click", async () => {
        peerState.mode.previous = !peerState.mode.previous;
        applyModeFallback();
        setModeButtonState();
        initSelectionFromActiveFunds();
        await refreshPeerComparison();
      });
      modeLatestButton?.addEventListener("click", async () => {
        peerState.mode.latest = !peerState.mode.latest;
        applyModeFallback();
        setModeButtonState();
        initSelectionFromActiveFunds();
        await refreshPeerComparison();
      });
      horizonSelect?.addEventListener("change", async () => {
        peerState.selectedHorizon = String(horizonSelect.value || "1");
        await refreshPeerComparison();
      });

      (async () => {
        try {
          await loadComparisonWorkbook();
          await loadLatestCsv();
          initSelectionFromActiveFunds();
          setModeButtonState();
          await loadAmfiNavCsvData();
          await refreshPeerComparison();
        } catch (error) {
          peerStatus.textContent = `Peer comparison init failed: ${error.message}`;
          console.error("Peer comparison initialization error.", error);
        }
      })();
    </script>
  </body>
</html>
